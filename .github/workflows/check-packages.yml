name: Check package versions

on:
  push:
    branches: [dev]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Guix
        run: |
          curl -L https://guix.gnu.org/install.sh -o /tmp/guix-install.sh
          chmod +x /tmp/guix-install.sh
          echo | sudo /tmp/guix-install.sh
          sudo systemctl start guix-daemon
          echo "$HOME/.config/guix/current/bin" >> $GITHUB_PATH

      - name: Get week (cache key)
        id: date
        run: echo "week=$(date +%Y-%V)" >> $GITHUB_OUTPUT

      - name: Cache guix pull
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/guix
          key: guix-pull-${{ runner.os }}-${{ steps.date.outputs.week }}

      - name: guix pull
        if: steps.cache.outputs.cache-hit != 'true'
        run: guix pull --channels=ci/channels.scm

      - name: List packages and run guix refresh
        id: check
        run: |
          packages=$(guix repl -- scripts/list-packages.scm | tr '\n' ' ')

          output=$(LANG=C guix refresh --load-path=. $packages 2>&1 || true)
          echo "$output"

          outdated=$(echo "$output" | grep "would be upgraded" || true)

          if [ -n "$outdated" ]; then
            echo "has_outdated=true" >> $GITHUB_OUTPUT
            {
              echo "report<<REPORT_EOF"
              echo "$outdated"
              echo "REPORT_EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has_outdated=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "outdated-packages" \
            --color "e4e669" \
            --description "Package needs version bump" 2>/dev/null || true

      - name: Create or update issues
        if: steps.check.outputs.has_outdated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          echo "$REPORT" | while IFS= read -r line; do
            pkg=$(echo "$line" | sed 's/.*: \([^ ]*\) would be upgraded from.*/\1/')
            old=$(echo "$line" | sed 's/.*upgraded from \([^ ]*\) to.*/\1/')
            new=$(echo "$line" | sed 's/.*upgraded from [^ ]* to \([^ ]*\)/\1/')

            title="update ${pkg}: ${old} → ${new}"

            existing=$(gh issue list \
              --label "outdated-packages" \
              --state open \
              --search "$pkg" \
              --json number,title \
              --jq ".[] | select(.title | startswith(\"update ${pkg}:\")) | .number" \
              | head -1)

            if [ -n "$existing" ]; then
              gh issue edit "$existing" --title "$title"
            else
              gh issue create \
                --title "$title" \
                --body "Nouvelle version \`${new}\` disponible pour \`${pkg}\` (actuellement \`${old}\`)." \
                --label "outdated-packages"
            fi
          done

      - name: Close resolved issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          outdated_pkgs=$(echo "$REPORT" | sed 's/.*: \([^ ]*\) would be upgraded from.*/\1/' | sort)

          gh issue list \
            --label "outdated-packages" \
            --state open \
            --json number,title \
            --jq '.[] | "\(.number) \(.title)"' | while IFS= read -r entry; do
              number=$(echo "$entry" | awk '{print $1}')
              pkg=$(echo "$entry" | sed 's/^[0-9]* update \([^:]*\):.*/\1/')

              if ! echo "$outdated_pkgs" | grep -qx "$pkg"; then
                gh issue close "$number" --comment "Paquet \`${pkg}\` à jour."
              fi
            done
